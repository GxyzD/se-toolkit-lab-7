version = 1
requires-python = ">=3.11"

[[package]]
name = "lms-bot"
version = "0.1.0"
source = { editable = "." }
dependencies = [
    { name = "python-telegram-bot" },
    { name = "python-dotenv" },
    { name = "requests" },
]

[[package]]
name = "python-telegram-bot"
version = "21.10"
source = { registry = "https://pypi.org/simple" }
dependencies = [
    { name = "httpx" },
]

[[package]]
name = "python-dotenv"
version = "1.0.1"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "requests"
version = "2.32.5"
source = { registry = "https://pypi.org/simple" }
dependencies = [
    { name = "certifi" },
    { name = "charset-normalizer" },
    { name = "idna" },
    { name = "urllib3" },
]
